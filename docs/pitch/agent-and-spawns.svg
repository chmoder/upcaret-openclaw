<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Queue, advisor-enrich orchestrator, research spawns, and lead scoring</title>
  <desc id="desc">Job queue to orchestrator; ten parallel research specialists; merged findings flow into lead scoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0b1f3b" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <g opacity="0.06" stroke="#0b1f3b" stroke-width="1">
    <path d="M0 120 H1920 M0 240 H1920 M0 360 H1920 M0 480 H1920 M0 600 H1920 M0 720 H1920 M0 840 H1920 M0 960 H1920"/>
    <path d="M120 0 V1080 M240 0 V1080 M360 0 V1080 M480 0 V1080 M600 0 V1080 M720 0 V1080 M840 0 V1080 M960 0 V1080 M1080 0 V1080 M1200 0 V1080 M1320 0 V1080 M1440 0 V1080 M1560 0 V1080 M1680 0 V1080 M1800 0 V1080"/>
  </g>

  <!-- Title -->
  <text x="960" y="52" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#0b1f3b">Agent &amp; spawns</text>
  <text x="960" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="19" fill="#475569">Ten research specialists in parallel; findings merge into lead scoring</text>

  <!-- Queue -->
  <g filter="url(#soft)">
    <rect x="660" y="102" width="600" height="72" rx="16" fill="#fff" stroke="#6366f1" stroke-width="2.5"/>
  </g>
  <text x="960" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#3730a3">QUEUE</text>
  <text x="960" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#64748b">enrichment_jobs &#183; pipeline: advisors &#183; enrichment-engine dispatches</text>

  <path d="M960 174 L960 196" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Hub -->
  <g filter="url(#soft)">
    <rect x="660" y="198" width="600" height="128" rx="20" fill="#fff" stroke="#14b8a6" stroke-width="3"/>
  </g>
  <text x="960" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#0b1f3b">ORCHESTRATOR: advisor-enrich</text>
  <text x="960" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#64748b">Decompose lead &#183; dispatch research spawns &#183; merge &#183; score</text>

  <circle cx="960" cy="352" r="10" fill="#14b8a6"/>

  <!-- Research specialist cards: row1 y=430, row2 y=630 (four cards centered). Lead scoring y=778 centered below. -->
  <g id="spawns" font-family="system-ui, sans-serif">
    <!-- Orchestrator fan: research specialists only (not scorer) -->
    <g stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M960 340 L960 365"/>
      <path d="M960 365 L360 430"/><path d="M960 365 L600 430"/><path d="M960 365 L840 430"/><path d="M960 365 L1080 430"/><path d="M960 365 L1320 430"/><path d="M960 365 L1560 430"/>
      <path d="M960 365 L600 630"/><path d="M960 365 L840 630"/><path d="M960 365 L1080 630"/><path d="M960 365 L1320 630"/>
    </g>

    <!-- Merge: each research card bottom -> lead scoring top (amber = same family as scorer) -->
    <g stroke="#f59e0b" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-opacity="0.85">
      <!-- row1 bottoms (cx, 518); row2 bottoms (cx, 718); scorer top (960, 778) -->
      <path d="M360 518 C360 640 960 700 960 778"/><path d="M600 518 C600 640 960 700 960 778"/><path d="M840 518 C840 640 960 700 960 778"/><path d="M1080 518 C1080 640 960 700 960 778"/><path d="M1320 518 C1320 640 960 700 960 778"/><path d="M1560 518 C1560 640 960 700 960 778"/>
      <path d="M600 718 C600 740 960 750 960 778"/><path d="M840 718 C840 740 960 750 960 778"/><path d="M1080 718 L960 778"/><path d="M1320 718 C1320 740 960 750 960 778"/>
    </g>

    <g filter="url(#soft)">
      <rect x="240" y="430" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="480" y="430" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="720" y="430" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="960" y="430" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="1200" y="430" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="1440" y="430" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="480" y="630" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="720" y="630" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="960" y="630" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="1200" y="630" width="240" height="88" rx="14" fill="#fff" stroke="#0b1f3b" stroke-width="1.5"/>
      <rect x="780" y="778" width="360" height="92" rx="16" fill="#fff" stroke="#f59e0b" stroke-width="2.75"/>
    </g>

    <text x="360" y="472" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">Profile discovery</text>
    <text x="360" y="496" text-anchor="middle" font-size="13" fill="#64748b">agents/profile</text>

    <text x="600" y="472" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">Certifications</text>
    <text x="600" y="496" text-anchor="middle" font-size="13" fill="#64748b">agents/cert</text>

    <text x="840" y="472" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">Website</text>
    <text x="840" y="496" text-anchor="middle" font-size="13" fill="#64748b">agents/website</text>

    <text x="1080" y="472" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">LinkedIn</text>
    <text x="1080" y="496" text-anchor="middle" font-size="13" fill="#64748b">agents/linkedin</text>

    <text x="1320" y="472" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">News</text>
    <text x="1320" y="496" text-anchor="middle" font-size="13" fill="#64748b">agents/news</text>

    <text x="1560" y="472" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">Awards</text>
    <text x="1560" y="496" text-anchor="middle" font-size="13" fill="#64748b">agents/award</text>

    <text x="600" y="672" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">Speaking</text>
    <text x="600" y="696" text-anchor="middle" font-size="13" fill="#64748b">agents/speaking</text>

    <text x="840" y="672" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">Network</text>
    <text x="840" y="696" text-anchor="middle" font-size="13" fill="#64748b">agents/network</text>

    <text x="1080" y="672" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">Phone</text>
    <text x="1080" y="696" text-anchor="middle" font-size="13" fill="#64748b">agents/phone</text>

    <text x="1320" y="672" text-anchor="middle" font-size="18" font-weight="600" fill="#0b1f3b">Email</text>
    <text x="1320" y="696" text-anchor="middle" font-size="13" fill="#64748b">agents/email</text>

    <text x="960" y="822" text-anchor="middle" font-size="20" font-weight="700" fill="#b45309">Lead scoring</text>
    <text x="960" y="848" text-anchor="middle" font-size="14" fill="#64748b">agents/scorer &#183; merged findings in</text>
  </g>

  <text x="960" y="928" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#64748b">Research spawns = <tspan font-weight="600" fill="#475569">agents/*.md</tspan> (parallel) &#183; scorer consumes combined JSON</text>
  <text x="960" y="958" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Upcaret OpenClaw &#183; advisor-enrich orchestration</text>
</svg>
